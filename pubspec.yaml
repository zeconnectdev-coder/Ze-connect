name: ze_connect
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- FIREBASE ---
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_messaging: ^15.2.1
  firebase_storage: ^12.3.6
  google_sign_in: ^6.1.6
  flutter_facebook_auth: ^6.0.0
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  shared_preferences: ^2.2.2

  # --- RESEAU ET STOCKAGE ---
  http: ^1.1.0

  # --- CARTOGRAPHIE ET GPS ---
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # --- LOCALISATION ET DATES EN FRANÇAIS ---
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

  # --- OUTILS ---
  permission_handler: ^11.3.1
  fluttertoast: ^8.2.10
  webview_flutter: ^4.13.0
  crop_your_image: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.6.3
  build_runner: ^2.11.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800

         